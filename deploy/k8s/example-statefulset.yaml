apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: app-with-qmesh
  namespace: default
spec:
  serviceName: qmesh-sidecar
  replicas: 3
  selector:
    matchLabels:
      app: app-with-qmesh
  template:
    metadata:
      labels:
        app: app-with-qmesh
        qmesh: enabled
    spec:
      serviceAccountName: qmesh-sidecar
      initContainers:
        - name: qmesh-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Install nslookup tool
              # Wait for DNS resolution of headless service
              echo "Waiting for QMesh service DNS..."
              until nslookup qmesh-sidecar.default.svc.cluster.local; do
                echo "DNS not ready, waiting..."
                sleep 2
              done
              echo "DNS ready, QMesh sidecar can start"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          env:
            - name: QMESH_SIDECAR_ENDPOINT
              value: "127.0.0.1:4224"
        - name: qmesh-sidecar
          image: qmesh-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: gossip
              containerPort: 4221
              protocol: UDP
            - name: quic
              containerPort: 4224
              protocol: TCP
          env:
            - name: GOSSIP_SEEDS
              value: ""
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            tcpSocket:
              port: 4224
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4224
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      restartPolicy: Always
