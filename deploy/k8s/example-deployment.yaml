apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-qmesh-sidecar
  namespace: default
  labels:
    app: app-with-qmesh
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-with-qmesh
  template:
    metadata:
      labels:
        app: app-with-qmesh
    spec:
      serviceAccountName: qmesh-sidecar
      
      # Init containers
      initContainers:
        # 1. Discover gossip seeds
        - name: qmesh-seed-discovery
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e
              NAMESPACE="${NAMESPACE:-default}"
              SERVICE_NAME="${SERVICE_NAME:-qmesh-sidecar}"
              GOSSIP_PORT="${GOSSIP_PORT:-4221}"
              POD_IP="${POD_IP:-}"
              
              echo "Discovering QMesh seeds..."
              
              # Wait for endpoints
              for i in $(seq 1 30); do
                ENDPOINTS=$(kubectl get endpoints "${SERVICE_NAME}" -n "${NAMESPACE}" -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null || echo "")
                if [ -n "$ENDPOINTS" ]; then
                  break
                fi
                echo "Waiting for endpoints... ($i/30)"
                sleep 2
              done
              
              SEEDS=""
              for ip in $ENDPOINTS; do
                # Skip own IP
                if [ "$ip" = "$POD_IP" ]; then
                  continue
                fi
                if [ -n "$SEEDS" ]; then
                  SEEDS="${SEEDS},${ip}:${GOSSIP_PORT}"
                else
                  SEEDS="${ip}:${GOSSIP_PORT}"
                fi
              done
              
              echo "Discovered seeds: ${SEEDS:-none}"
              echo -n "$SEEDS" > /shared/gossip-seeds
              echo "Seeds written to shared volume"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_NAME
              value: "qmesh-sidecar"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        
        # 2. Setup iptables for transparent proxy
        - name: qmesh-iptables
          image: qmesh-init:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              /usr/local/bin/setup-iptables.sh
              echo "iptables rules applied, keeping container running to maintain rules"
              sleep infinity
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            runAsUser: 0
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PROXY_PORT
              value: "3128"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      
      containers:
        # Main application container
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          env:
            - name: QMESH_SIDECAR_ADDR
              value: "127.0.0.1:4224"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        
        # QMesh Sidecar container
        - name: qmesh-sidecar
          image: qmesh-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: gossip
              containerPort: 4221
              protocol: UDP
            - name: quic
              containerPort: 4224
              protocol: TCP
            - name: proxy
              containerPort: 3128
              protocol: TCP
          env:
            - name: GOSSIP_SEEDS
              value: ""
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 4224
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 4224
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      
      volumes:
        - name: shared-data
          emptyDir: {}
      
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: app-with-qmesh
  labels:
    app: app-with-qmesh
spec:
  selector:
    app: app-with-qmesh
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
